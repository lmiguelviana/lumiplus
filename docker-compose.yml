version: '3.9'

# ─────────────────────────────────────────────────────────
#  LumiPlus — Docker Compose
#  Uso: cp .env.example .env && docker compose up -d
# ─────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lumiplus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumiplus
      POSTGRES_PASSWORD: lumiplus
      POSTGRES_DB: lumiplus_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiplus -d lumiplus_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lumiplus_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (API Fastify) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumiplus_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://lumiplus:lumiplus@postgres:5432/lumiplus_db?schema=public"
      REDIS_URL: "redis://redis:6379"
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Dashboard (Next.js) ──────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:3001
    container_name: lumiplus_dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
